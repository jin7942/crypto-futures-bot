# shared_sentiment: named volume → bind mount로 변경 (ADR-004)
# 네이티브 OpenClaw에서 직접 접근 가능하도록 호스트 디렉토리 사용

networks:
  jin-net:
    external: true

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./nfi/NostalgiaForInfinityX7.py:/freqtrade/user_data/strategies/NostalgiaForInfinityX7.py:ro
      - ./nfi/configs:/freqtrade/nfi-configs:ro
      - /opt/openclaw/shared/sentiment:/freqtrade/user_data/shared
    env_file:
      - .env
    networks:
      - default
      - jin-net
    command: >
      trade
      --config user_data/config.json
      --config user_data/config.local.json
      --config /freqtrade/nfi-configs/pairlist-static-binance-futures-usdt.json
      --config /freqtrade/nfi-configs/blacklist-binance.json
      --config /freqtrade/nfi-configs/trading_mode-futures.json
      --strategy NostalgiaForInfinityX7
      --logfile user_data/logs/freqtrade.log

  # OpenClaw: 네이티브(systemd) 배포로 전환. ADR-004 참고.
  # /factory/openclaw-agent/ 에서 관리.
